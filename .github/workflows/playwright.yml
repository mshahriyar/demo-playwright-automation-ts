name: Playwright CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_gmail_e2e:
        description: 'Run Gmail-dependent tests'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
      artifact_mode:
        description: 'CI artifact detail level'
        required: false
        type: choice
        default: 'failures'
        options:
          - 'failures'
          - 'full'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2,3,4]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
      SHARD_TOTAL: 4
      BASE_URL: ${{ vars.BASE_URL || 'https://portal.dev.mehan.ae' }}
      LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
      RUN_GMAIL_E2E: ${{ inputs.run_gmail_e2e || 'false' }}
      CI_ARTIFACTS: ${{ inputs.artifact_mode || 'failures' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Check required secrets
        id: secrets_check
        run: |
          if [[ -n "${LOGIN_EMAIL}" && -n "${LOGIN_PASSWORD}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::LOGIN_EMAIL / LOGIN_PASSWORD are not configured. Browser tests will be skipped."
          fi

      - name: Install Playwright Browsers
        if: ${{ steps.secrets_check.outputs.ready == 'true' }}
        run: npx playwright install chromium

      - name: Run Playwright tests
        if: ${{ steps.secrets_check.outputs.ready == 'true' }}
        run: npx playwright test --reporter=blob --shard=${{ matrix.shard_index }}/${{ env.SHARD_TOTAL }}

      - uses: actions/upload-artifact@v4
        if: ${{ always() && !cancelled() && steps.secrets_check.outputs.ready == 'true' }}
        with:
          name: blob-report-${{ matrix.shard_index }}
          path: blob-report/
          retention-days: 30

  merge-reports:
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge to HTML report
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
