name: Playwright CI (Nightly Full)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_gmail_e2e:
        description: 'Run Gmail-dependent tests'
        required: false
        type: choice
        default: 'true'
        options:
          - 'false'
          - 'true'
      artifact_mode:
        description: 'CI artifact detail level'
        required: false
        type: choice
        default: 'full'
        options:
          - 'failures'
          - 'full'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3, 4]
    timeout-minutes: 90
    runs-on: ubuntu-latest
    env:
      CI: true
      SHARD_TOTAL: 4
      BASE_URL: ${{ vars.BASE_URL || 'https://portal.dev.mehan.ae' }}
      LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
      GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
      GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
      RUN_GMAIL_E2E: ${{ github.event.inputs.run_gmail_e2e || 'true' }}
      CI_ARTIFACTS: ${{ github.event.inputs.artifact_mode || 'full' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Check required secrets
        id: secrets_check
        run: |
          if [[ -n "${LOGIN_EMAIL}" && -n "${LOGIN_PASSWORD}" ]]; then
            if [[ "${RUN_GMAIL_E2E}" == "true" ]]; then
              if [[ -n "${GMAIL_CREDENTIALS_JSON}" && -n "${GMAIL_TOKEN_JSON}" ]]; then
                echo "ready=true" >> "$GITHUB_OUTPUT"
              else
                echo "ready=false" >> "$GITHUB_OUTPUT"
                echo "::warning::RUN_GMAIL_E2E=true but GMAIL_CREDENTIALS_JSON / GMAIL_TOKEN_JSON are missing."
              fi
            else
              echo "ready=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::LOGIN_EMAIL / LOGIN_PASSWORD are not configured. Browser tests will be skipped."
          fi

      - name: Prepare Gmail auth files
        if: ${{ steps.secrets_check.outputs.ready == 'true' && env.RUN_GMAIL_E2E == 'true' }}
        run: |
          printf '%s' "$GMAIL_CREDENTIALS_JSON" > credentials.json
          printf '%s' "$GMAIL_TOKEN_JSON" > token.json

      - name: Install Playwright Browsers
        if: ${{ steps.secrets_check.outputs.ready == 'true' }}
        run: npx playwright install chromium

      - name: Run Playwright tests
        if: ${{ steps.secrets_check.outputs.ready == 'true' }}
        run: npx playwright test --reporter=blob --shard=${{ matrix.shard_index }}/${{ env.SHARD_TOTAL }}

      - uses: actions/upload-artifact@v4
        if: ${{ always() && !cancelled() && steps.secrets_check.outputs.ready == 'true' }}
        with:
          name: nightly-blob-report-${{ matrix.shard_index }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: all-blob-reports
          pattern: nightly-blob-report-*
          merge-multiple: true

      - name: Check blob reports directory
        id: blob_check
        run: |
          if [[ -d all-blob-reports ]] && [[ -n "$(ls -A all-blob-reports 2>/dev/null)" ]]; then
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No blob reports found. Skipping merge."
          fi

      - name: Merge to HTML report
        if: ${{ steps.blob_check.outputs.has_reports == 'true' }}
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - uses: actions/upload-artifact@v4
        if: ${{ steps.blob_check.outputs.has_reports == 'true' }}
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 30
