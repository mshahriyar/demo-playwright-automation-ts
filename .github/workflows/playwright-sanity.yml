name: Playwright CI (Sanity)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      artifact_mode:
        description: 'CI artifact detail level'
        required: false
        type: choice
        default: 'failures'
        options:
          - 'failures'
          - 'full'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
      SHARD_TOTAL: 2
      BASE_URL: ${{ vars.BASE_URL || 'https://portal.dev.mehan.ae' }}
      LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      RUN_GMAIL_E2E: 'false'
      CI_ARTIFACTS: ${{ github.event.inputs.artifact_mode || 'failures' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Check required secrets
        id: secrets_check
        run: |
          if [[ -n "${LOGIN_EMAIL}" && -n "${LOGIN_PASSWORD}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::LOGIN_EMAIL / LOGIN_PASSWORD are not configured. Sanity tests will be skipped."
          fi

      - name: Install Playwright Browsers
        if: ${{ steps.secrets_check.outputs.ready == 'true' }}
        run: npx playwright install chromium

      - name: Run Sanity tests
        if: ${{ steps.secrets_check.outputs.ready == 'true' }}
        run: npx playwright test --grep @sanity --grep-invert @gmail --reporter=blob --shard=${{ matrix.shard_index }}/${{ env.SHARD_TOTAL }}

      - uses: actions/upload-artifact@v4
        if: ${{ always() && !cancelled() && steps.secrets_check.outputs.ready == 'true' }}
        with:
          name: sanity-blob-report-${{ matrix.shard_index }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: all-blob-reports
          pattern: sanity-blob-report-*
          merge-multiple: true

      - name: Check blob reports directory
        id: blob_check
        run: |
          if [[ -d all-blob-reports ]] && [[ -n "$(ls -A all-blob-reports 2>/dev/null)" ]]; then
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No sanity blob reports found. Skipping merge."
          fi

      - name: Merge to HTML report
        if: ${{ steps.blob_check.outputs.has_reports == 'true' }}
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - uses: actions/upload-artifact@v4
        if: ${{ steps.blob_check.outputs.has_reports == 'true' }}
        with:
          name: playwright-report-sanity
          path: playwright-report/
          retention-days: 14
